<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyper Crawler</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="./styles.css" type="text/css" />
  </head>
  <body>
    <div class="container">
      <div class="header-container">
        <h1>HYPER CRAWLER</h1>
        <span id="generalRequestBtn" class="header-request-btn"
          >Make a Request</span
        >
      </div>

      <input
        type="text"
        id="searchInput"
        placeholder="Search by file name or category..."
        autocomplete="off"
      />

      <div id="filterContainer" class="filter-container">
        <label class="filter-option">
          <input type="radio" name="typeFilter" value="All" checked /> All
        </label>
        <label class="filter-option">
          <input type="radio" name="typeFilter" value="Software" /> Software
        </label>
        <label class="filter-option">
          <input type="radio" name="typeFilter" value="Course" /> Course
        </label>
      </div>

      <div id="summary">
        <div class="summary-row">
          <div class="stat-group">
            <div>Softwares</div>
            <div class="summary-stat" id="softwaresCount">0</div>
          </div>
          <div class="stat-group">
            <div>Courses</div>
            <div class="summary-stat" id="coursesCount">0</div>
          </div>
          <div class="stat-group">
            <div>Total Indexed</div>
            <div class="summary-stat" id="totalFiles">0</div>
          </div>
        </div>

        <div class="summary-row">
          <div class="stat-group">
            <div>Total Storage Footprint</div>
            <div class="summary-stat" id="totalSize">0 B</div>
          </div>
        </div>
      </div>

      <ul id="results" class="hidden"></ul>
      <span id="syncStatus" class="sync-status">Syncing...</span>
    </div>
    <div id="requestModal" class="modal hidden">
      <div class="modal-content">
        <span id="closeModal" class="close-btn">&times;</span>
        <h2>MAKE A REQUEST</h2>
        <p>Didn't find what you need? Request it below.</p>
        <form id="requestForm">
          <input
            type="text"
            id="requestInput"
            placeholder="Request Name"
            required
          />
          <input type="email" id="requestEmail" placeholder="Email" required />
          <textarea
            id="requestNotes"
            placeholder="Links and Notes (Optional)"
            rows="3"
          ></textarea>
          <button type="submit" class="submit-btn">SEND REQUEST</button>
        </form>
        <div id="requestStatus" class="hidden"></div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
