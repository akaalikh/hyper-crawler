<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Hyper Crawler</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="./styles.css" type="text/css" />
  </head>
  <body>
    <div class="container">
      <div class="header-container">
        <h1>Hyper Crawler</h1>
        <button id="generalRequestBtn" class="header-request-btn">
          Make a Request
        </button>
      </div>

      <div class="search-wrapper">
        <input
          type="text"
          id="searchInput"
          placeholder="Search by file name or category..."
          autocomplete="off"
        />
        <button id="clearSearchBtn" class="clear-search-btn hidden" type="button" aria-label="Clear search">&times;</button>
      </div>

      <div id="filterContainer" class="filter-container">
        <label class="filter-option">
          <input type="radio" name="typeFilter" value="All" checked />
          <span class="filter-label">All</span>
        </label>
        <label class="filter-option">
          <input type="radio" name="typeFilter" value="Software" />
          <span class="filter-label">Software</span>
        </label>
        <label class="filter-option">
          <input type="radio" name="typeFilter" value="Course" />
          <span class="filter-label">Course</span>
        </label>
      </div>

      <div id="summary">
        <div class="summary-row">
          <div class="stat-group">
            <div class="stat-label">Software</div>
            <div class="summary-stat" id="softwaresCount">0</div>
          </div>
          <div class="stat-group">
            <div class="stat-label">Courses</div>
            <div class="summary-stat" id="coursesCount">0</div>
          </div>
          <div class="stat-group">
            <div class="stat-label">Total</div>
            <div class="summary-stat" id="totalFiles">0</div>
          </div>
        </div>

        <div class="summary-row">
          <div class="stat-group">
            <div class="stat-label">Total Size</div>
            <div class="summary-stat" id="totalSize">0 B</div>
          </div>
        </div>
      </div>

      <ul id="results" class="hidden"></ul>
      
      <div class="footer-status">
        <span id="syncStatus" class="sync-status">Syncing...</span>
      </div>
    </div>

    <div id="requestModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Make a Request</h2>
          <span id="closeModal" class="close-btn">&times;</span>
        </div>
        <p class="modal-subtitle">Didn't find what you need? Let us know below.</p>
        <form id="requestForm">
          <input
            type="text"
            id="requestInput"
            placeholder="Request Name"
            required
          />
          <input type="email" id="requestEmail" placeholder="Email Address" required />
          <textarea
            id="requestNotes"
            placeholder="Links and Notes (Optional)"
            rows="3"
          ></textarea>
          <button type="submit" class="submit-btn">Send Request</button>
        </form>
        <div id="requestStatus" class="hidden"></div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
